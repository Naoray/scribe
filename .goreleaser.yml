version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: scribe
    main: ./cmd/scribe
    binary: scribe
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: scribe
    repository:
      owner: Naoray
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/Naoray/scribe
    description: "Team skill sync CLI for AI coding agents"
    license: MIT
    install: |
      bin.install "scribe"
    test: |
      system "#{bin}/scribe", "--help"
