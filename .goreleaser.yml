version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: scribe
    main: ./cmd/scribe
    binary: scribe
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/Naoray/scribe/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: scribe
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: scribe
    repository:
      owner: Naoray
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Naoray/scribe"
    description: "Team skill sync CLI for AI coding agents"
    license: "MIT"
    install: |
      bin.install "scribe"
    test: |
      system "#{bin}/scribe", "--version"
